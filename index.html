<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vertical Page Landing</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <img src="https://via.placeholder.com/1600x500/F1DABF/5C4B51?text=Vertical+Landing+Header" alt="Header Image" />
    </header>

    <div class="intro section">
      <img src="https://via.placeholder.com/280x280/CDE7BE/2F5233?text=Left+Image" alt="Image 1" class="side-img left" />
      <img src="https://via.placeholder.com/280x280/F4B6C2/5C2A35?text=Right+Image" alt="Image 2" class="side-img right" />
    </div>

    <div class="sections">
      <div class="section text-left">
        <img src="https://via.placeholder.com/900x600/BDE0FE/1D3557?text=Section+1" alt="Image 3" class="section-img" />
        <p>Text for section 1.</p>
      </div>
      <div class="section text-right">
        <p>Text for section 2.</p>
        <img src="https://via.placeholder.com/900x600/FFC8DD/6D2E46?text=Section+2" alt="Image 4" class="section-img" />
      </div>
      <div class="section text-left">
        <img src="https://via.placeholder.com/900x600/C5FAD5/1B4332?text=Section+3" alt="Image 5" class="section-img" />
        <p>Text for section 3.</p>
      </div>
      <div class="section text-right">
        <p>Text for section 4.</p>
        <img src="https://via.placeholder.com/900x600/FDE2E4/4A4E69?text=Section+4" alt="Image 6" class="section-img" />
      </div>
      <div class="section text-left">
        <img src="https://via.placeholder.com/900x600/D8E2DC/344E41?text=Section+5" alt="Image 7" class="section-img" />
        <p>Text for section 5.</p>
      </div>
      <div class="section text-right">
        <p>Text for section 6.</p>
        <img src="https://via.placeholder.com/900x600/FFE5B4/5B3A29?text=Section+6" alt="Image 8" class="section-img" />
      </div>
      <div class="section text-left">
        <img src="https://via.placeholder.com/900x600/CDEAC0/2D6A4F?text=Section+7" alt="Image 9" class="section-img" />
        <p>Text for section 7.</p>
      </div>
      <div class="section text-right">
        <p>Text for section 8.</p>
        <img src="https://via.placeholder.com/900x600/E9D8FD/3C096C?text=Section+8" alt="Image 10" class="section-img" />
      </div>
    </div>

    <script src="scripts.js"></script>
  </body>
</html>
