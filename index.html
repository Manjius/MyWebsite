<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vertical Page Landing</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <img src="assets/header_image.jpg" alt="Header Image" />
    </header>

    <div class="intro section">
      <img src="assets/blok1.jpg" alt="Image 1" class="side-img left" />
      <img src="assets/blok2.jpg" alt="Image 2" class="side-img right" />
    </div>

    <div class="sections">
      <div class="section text-left">
        <img src="assets/blok3.jpg" alt="Image 3" class="section-img" />
        <p>Text for section 1.</p>
      </div>
      <div class="section text-right">
        <p>Text for section 2.</p>
        <img src="assets/blok4.jpg" alt="Image 4" class="section-img" />
      </div>
      <div class="section text-left">
        <img src="assets/blok5.jpg" alt="Image 5" class="section-img" />
        <p>Text for section 3.</p>
      </div>
      <div class="section text-right">
        <p>Text for section 4.</p>
        <img src="assets/blok6.jpg" alt="Image 6" class="section-img" />
      </div>
      <div class="section text-left">
        <img src="assets/blok7.jpg" alt="Image 7" class="section-img" />
        <p>Text for section 5.</p>
      </div>
      <div class="section text-right">
        <p>Text for section 6.</p>
        <img src="assets/blok8.jpg" alt="Image 8" class="section-img" />
      </div>
      <div class="section text-left">
        <img src="assets/blok9.jpg" alt="Image 9" class="section-img" />
        <p>Text for section 7.</p>
      </div>
      <div class="section text-right">
        <p>Text for section 8.</p>
        <img src="assets/blok10.jpg" alt="Image 10" class="section-img" />
      </div>
    </div>

    <script src="scripts.js"></script>
  </body>
</html>
